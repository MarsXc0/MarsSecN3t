apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-service
  namespace: monitoring
  labels:
    app: monitoring-service
    project: SecN3t
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitoring-service
      project: SecN3t
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: monitoring-service
        project: SecN3t
        tier: backend
    spec:
      containers:
      - name: monitoring-service
        image: nginx:alpine
        ports:
        - containerPort: 80
